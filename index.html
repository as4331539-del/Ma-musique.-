<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Label Music</title>
    <style>
        :root {
            --primary: #1db954; /* Vert style Spotify */
            --dark: #121212;
            --light: #b3b3b3;
            --white: #ffffff;
            --card-bg: #181818;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--dark);
            color: var(--white);
            margin: 0;
            padding-bottom: 100px; /* Espace pour le lecteur fixe */
        }

        /* En-tête */
        header {
            padding: 20px;
            background: linear-gradient(to bottom, #404040, var(--dark));
        }
        h1 { margin: 0; font-size: 1.5rem; }
        p { color: var(--light); margin-top: 5px; }

        /* Liste des musiques */
        .track-list {
            padding: 10px;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .track-item:hover {
            background-color: #282828;
        }

        .track-item.active {            background-color: #282828;
            border-left: 4px solid var(--primary);
        }

        .track-img {
            width: 50px;
            height: 50px;
            background-color: #333;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .track-info {
            flex: 1;
        }

        .track-title { font-weight: bold; display: block; }
        .track-artist { font-size: 0.9rem; color: var(--light); }

        /* Lecteur Fixe en bas */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #181818;
            border-top: 1px solid #282828;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: #535353;
            border-radius: 2px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);            width: 0%;
            border-radius: 2px;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-control {
            background: none;
            border: none;
            color: var(--white);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .btn-play {
            font-size: 2.5rem;
            color: var(--white);
        }

        .current-track-info {
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎵 Mon Label</h1>
        <p>Découvrez mes derniers sons</p>
    </header>

    <div class="track-list" id="trackList">
        <!-- Les musiques seront générées ici par JS -->
    </div>

    <!-- Lecteur Audio Fixe -->
    <div class="player-bar">
        <div class="current-track-info" id="currentInfo">Sélectionnez un titre</div>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="controls">            <button class="btn-control" onclick="prevTrack()">⏮</button>
            <button class="btn-control btn-play" onclick="togglePlay()" id="playBtn">▶</button>
            <button class="btn-control" onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <script>
        // --- DONNÉES (Vous ajouterez vos liens MP3 ici) ---
        // Pour l'exemple, j'utilise des sons libres de droits
        const tracks = [
            {
                title: "Ambient Chill",
                artist: "Artiste Inconnu",
                src: "https://www.soundhelix.com/games/mp3/SoundHelix-Song-1.mp3",
                cover: "🌌"
            },
            {
                title: "Upbeat Pop",
                artist: "SoundHelix",
                src: "https://www.soundhelix.com/games/mp3/SoundHelix-Song-2.mp3",
                cover: "🎸"
            },
            {
                title: "Piano Solo",
                artist: "Classic Vibes",
                src: "https://www.soundhelix.com/games/mp3/SoundHelix-Song-3.mp3",
                cover: "🎹"
            }
        ];

        let currentTrackIndex = 0;
        let isPlaying = false;
        const audio = new Audio();
        
        const trackListEl = document.getElementById('trackList');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentInfo = document.getElementById('currentInfo');

        // Initialisation
        function init() {
            renderList();
            loadTrack(currentTrackIndex);
        }

        // Afficher la liste
        function renderList() {
            trackListEl.innerHTML = '';
            tracks.forEach((track, index) => {                const div = document.createElement('div');
                div.className = `track-item ${index === currentTrackIndex ? 'active' : ''}`;
                div.onclick = () => playTrack(index);
                div.innerHTML = `
                    <div class="track-img">${track.cover}</div>
                    <div class="track-info">
                        <span class="track-title">${track.title}</span>
                        <span class="track-artist">${track.artist}</span>
                    </div>
                `;
                trackListEl.appendChild(div);
            });
        }

        // Charger une piste
        function loadTrack(index) {
            audio.src = tracks[index].src;
            currentInfo.innerText = `${tracks[index].title} - ${tracks[index].artist}`;
            renderList(); // Mettre à jour la classe 'active'
        }

        // Jouer une piste spécifique
        function playTrack(index) {
            if (index !== currentTrackIndex) {
                currentTrackIndex = index;
                loadTrack(index);
            }
            togglePlay();
        }

        // Play / Pause
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.innerText = "▶";
            } else {
                audio.play();
                playBtn.innerText = "⏸";
            }
            isPlaying = !isPlaying;
        }

        // Suivant / Précédent
        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % tracks.length;
            loadTrack(currentTrackIndex);
            if(isPlaying) audio.play();
        }

        function prevTrack() {            currentTrackIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
            loadTrack(currentTrackIndex);
            if(isPlaying) audio.play();
        }

        // Barre de progression
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${percent}%`;
        });

        // Clic sur la barre pour avancer
        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        });

        // Auto-next quand fini
        audio.addEventListener('ended', nextTrack);

        init();
    </script>
</body>
      </html>
